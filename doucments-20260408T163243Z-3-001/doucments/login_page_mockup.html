<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Incident Manager</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        margin: 0;
        background-color: #0f1117;
        background-image: radial-gradient(circle, #2a2d3a 1px, transparent 1px);
        background-size: 28px 28px;
        font-family: 'Inter', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .lc {
        background: #1a1d27;
        border: 1px solid #2e3148;
        border-radius: 16px;
        padding: 3rem 2.5rem;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      }
      .lc-logo {
        width: 50px; height: 50px;
        background: #4f46e5;
        border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 1.5rem;
        font-size: 24px;
        box-shadow: 0 8px 16px rgba(79, 70, 229, 0.4);
      }
      .lc-title {
        text-align: center;
        font-size: 18px;
        font-weight: 800;
        color: #fff;
        margin: 0 0 6px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .lc-sub {
        text-align: center;
        font-size: 12px;
        color: #6b6f85;
        margin: 0 0 2.5rem;
        line-height: 1.5;
        padding: 0 10px;
      }
      .lc-label {
        display: block;
        font-size: 11px;
        color: #9294a8;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .lc-input {
        width: 100%;
        background: #0f1117;
        border: 1px solid #2e3148;
        border-radius: 8px;
        padding: 12px 14px;
        font-size: 14px;
        color: #fff;
        margin-bottom: 1.25rem;
        outline: none;
      }
      .lc-btn {
        width: 100%;
        background: #4f46e5;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 13px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 10px;
      }
      .lc-btn:hover { background: #4338ca; }
    </style>
</head>
<body>

<div class="lc">
  <div class="lc-logo">✨</div>
  <p class="lc-title">AI INCIDENT MANAGER</p>
  <p class="lc-sub">AI-powered social issue detection and rapid triage dashboard.</p>

  <label class="lc-label">Email</label>
  <input class="lc-input" type="email" value="arvind@sid.com"/>

  <label class="lc-label">Password</label>
  <input class="lc-input" type="password" value="••••••••"/>

  <button class="lc-btn">Sign in to Control Center</button>
</div>

</body>
</html>
